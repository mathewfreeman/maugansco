<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maugans co. | private preview</title>
    
    <!-- Minimalist 3x3 Dot Grid SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2304d9c4'><circle cx='5' cy='5' r='2'/><circle cx='12' cy='5' r='2'/><circle cx='19' cy='5' r='2'/><circle cx='5' cy='12' r='2'/><circle cx='12' cy='12' r='2'/><circle cx='19' cy='12' r='2'/><circle cx='5' cy='19' r='2'/><circle cx='12' cy='19' r='2'/><circle cx='19' cy='19' r='2'/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding-top: 64px !important; /* Essential padding for the fixed feedback header */
        }

        .selection-glow::selection {
            background-color: rgba(4, 217, 196, 0.2);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col justify-center items-center p-6 selection-glow">

    <!-- Feedback Header will be injected here by script -->

    <main class="max-w-lg w-full bg-white px-8 py-12 sm:p-12 border border-slate-100 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-center fade-in">
        
        <h1 class="text-2xl font-medium tracking-tight text-slate-900 mb-1">
            maugans co.
        </h1>
        
        <p class="text-[12px] font-normal text-gray-400 tracking-[0.15em] mb-8">
            private preview
        </p>
        
        <div class="w-10 h-[1px] bg-slate-200 mx-auto mb-8"></div>
        
        <p class="text-slate-600 text-base leading-relaxed mb-6 font-normal">
            This domain serves as a private staging and testing server for client projects currently under development. 
        </p>
        
        <p class="text-slate-600 text-base leading-relaxed mb-6 font-normal">
            If you are a client looking for your work-in-progress build, please navigate to the exact secure URL provided to you.
        </p>

        <a href="mailto:hello@maugansco.com" class="inline-block text-base text-[#04d9c4] hover:text-[#03c4b1] transition-colors underline decoration-[#04d9c4]/30 hover:decoration-[#04d9c4]/60 underline-offset-4 font-light">
            hello@maugansco.com
        </a>

    </main>

    <footer class="mt-12 text-slate-400 text-xs fade-in" style="animation-delay: 0.2s; opacity: 0;">
        &copy; <script>document.write(new Date().getFullYear())</script> Maugans Co.
    </footer>

    <!-- Feedback Header Script -->
    <script>
    (function() {
        const siteKey = "main"; 
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwxVHFojk0hCSB4hM7HvFSHNDXrfUAzJ_4HMEMRyglDaP8AMXY8rHNYTzZZsJvPBZIjGw/exec";

        const style = document.createElement('style');
        style.textContent = `
            #maugans-preview-header {
                position: fixed; top: 0; left: 0; width: 100%; height: 64px;
                background: #ffffff; border-bottom: 1px solid #ececec;
                display: flex; align-items: center; justify-content: space-between;
                padding: 0 24px; box-sizing: border-box; z-index: 99999;
                font-family: 'IBM Plex Sans', sans-serif; color: #1a1a1a;
                -webkit-transform: translate3d(0,0,0);
                transform: translate3d(0,0,0);
                -webkit-backface-visibility: hidden;
            }
            .maugans-header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
            .maugans-logo-svg { width: 20px; height: 20px; display: block; }
            .maugans-header-title { font-weight: 500; font-size: 16px; letter-spacing: -0.01em; }
            .maugans-header-title span { color: #999; font-weight: 400; margin-left: 4px; }
            .maugans-input-container { position: relative; width: 100%; max-width: 400px; display: flex; align-items: center; margin-left: auto; }
            
            #maugans-input {
                width: 100%; background: #f8f8f8; border: 1px solid #ececec; border-radius: 8px;
                padding: 10px 64px 10px 14px; font-family: 'IBM Plex Sans', sans-serif; 
                font-size: 16px; /* Change from 13px to 16px */
                -webkit-text-size-adjust: 100%; /* Force Safari to respect 16px without inflation */
                touch-action: manipulation; /* Optimizes for taps vs zooms */
                outline: none; transition: all 0.2s ease; color: #1a1a1a;
            }

            #maugans-input:focus { background: #fff; border-color: #04d9c4; box-shadow: 0 0 0 3px rgba(4, 217, 196, 0.08); }
            #maugans-submit {
                position: absolute; right: 8px; background: transparent; color: #04d9c4; border: none;
                padding: 6px 10px; border-radius: 6px; font-family: 'IBM Plex Sans', sans-serif;
                font-weight: 400; font-size: 16px; cursor: pointer; transition: all 0.2s ease;
                opacity: 0; pointer-events: none; visibility: hidden;
            }
            #maugans-input:not(:placeholder-shown) + #maugans-submit { opacity: 1; visibility: visible; pointer-events: auto; }
            #maugans-submit:hover { background: rgba(4, 217, 196, 0.08); }
            #maugans-submit:disabled { opacity: 0.5; cursor: not-allowed; }
            @media (max-width: 750px) {
            .maugans-header-title span { display: none; }
            }
            @media (max-width: 640px) {
            #maugans-preview-header { padding: 0 12px; }
            .maugans-input-container { margin-left: 8px; max-width: none; flex-grow: 1; }
            }
        `;
        document.head.appendChild(style);

        const header = document.createElement('header');
        header.id = 'maugans-preview-header';
        header.innerHTML = `
            <div class="maugans-header-left">
                <svg class="maugans-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#04d9c4">
                    <circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
                    <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
                    <circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
                </svg>
                <div class="maugans-header-title">maugans co. <span>|<span> private preview</span></div>
            </div>
            <div class="maugans-input-container">
                <input type="text" id="maugans-input" placeholder="notes..." autocomplete="off">
                <button id="maugans-submit">send</button>
            </div>
        `;
        document.body.prepend(header);

        const submitBtn = document.getElementById('maugans-submit');
        const inputField = document.getElementById('maugans-input');

        const handleSubmit = async () => {
            const userInput = inputField.value.trim();
            if (!userInput) return;

            // Clear input and blur immediately
            inputField.value = "";
            inputField.placeholder = ""; 
            inputField.blur();

            // Set button to sending state
            submitBtn.disabled = true;
            submitBtn.innerText = "sending...";
            
            // Lock button visibility manually while input is blank
            submitBtn.style.opacity = "1";
            submitBtn.style.visibility = "visible";
            submitBtn.style.pointerEvents = "none";

            const deviceInfo = navigator.userAgent;
            const scrollY = window.scrollY || window.pageYOffset;
            const docHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
            const winHeight = window.innerHeight;
            const scrollPercent = Math.round((scrollY / (docHeight - winHeight)) * 100) + "%";

            const sections = document.querySelectorAll('[id]');
            let nearestId = "none";
            let closestDist = Infinity;
            sections.forEach(sec => {
                const rect = sec.getBoundingClientRect();
                const dist = Math.abs(rect.top);
                const ignoredIds = ['maugans-preview-header', 'gate', 'content'];
                if (dist < closestDist && !ignoredIds.includes(sec.id)) {
                    closestDist = dist;
                    nearestId = "#" + sec.id;
                }
            });
            
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'timestamp': new Date().toLocaleString(),
                        'site': siteKey,
                        'nearestSection': nearestId,
                        'scrollPercent': scrollPercent,
                        'scrollPixels': scrollY + "px",
                        'feedback': userInput,
                        'device': deviceInfo
                    })
                });

                // Success visual state
                submitBtn.innerText = "note saved";
                
                setTimeout(() => {
                    // Start fading out the button
                    submitBtn.style.opacity = "0";

                    // Wait for the fade (transition: 0.2s) before resetting text
                    setTimeout(() => {
                        // Reset visibility/opacity overrides so CSS takes back control
                        submitBtn.style.opacity = "";
                        submitBtn.style.visibility = "";
                        submitBtn.style.pointerEvents = "";
                        
                        // Change text while it's invisible
                        submitBtn.innerText = "send";
                        // Restore placeholder
                        inputField.placeholder = "notes..."; 
                        submitBtn.disabled = false;
                    }, 250);

                }, 1500);

            } catch (error) {
                submitBtn.innerText = "error";
                setTimeout(() => {
                    submitBtn.style.opacity = "";
                    submitBtn.style.visibility = "";
                    submitBtn.innerText = "send";
                    inputField.placeholder = "notes...";
                    submitBtn.disabled = false;
                }, 2000);
            }
        };

        submitBtn.addEventListener('click', handleSubmit);
        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
    })();
    </script>

</body>
</html>
